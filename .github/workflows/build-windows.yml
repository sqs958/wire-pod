name: Build wire-pod Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'v1.1.2-chinese-tts'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 build-essential autoconf libtool automake pkg-config wget unzip curl git
          sudo apt-get install -y mingw-w64-tools
          
      - name: Clone and build opus
        run: |
          export PODHOST=x86_64-w64-mingw32
          export PODLIBS=${GITHUB_WORKSPACE}/libs
          mkdir -p ${PODLIBS}/opus ${PODLIBS}/ogg
          
          # Build ogg first
          cd ${GITHUB_WORKSPACE}
          rm -rf ogg opus
          git clone --depth=1 https://github.com/xiph/ogg
          cd ogg
          ./autogen.sh
          ./configure --host=${PODHOST} --prefix="${PODLIBS}/ogg"
          make -j$(nproc)
          sudo make install
          ls -la ${PODLIBS}/ogg/lib/pkgconfig/
          
          # Build opus
          cd ${GITHUB_WORKSPACE}
          git clone --depth=1 https://github.com/xiph/opus
          cd opus
          ./autogen.sh
          ./configure --host=${PODHOST} --prefix="${PODLIBS}/opus"
          make -j$(nproc)
          sudo make install
          ls -la ${PODLIBS}/opus/lib/pkgconfig/
          
      - name: Clone vosk
        run: |
          mkdir -p libs/vosk
          cd libs/vosk
          wget -q https://github.com/alphacep/vosk-api/releases/download/v0.3.45/vosk-win64-0.3.45.zip
          unzip -o vosk-win64-0.3.45.zip
          mv vosk-win64-0.3.45 vosk
          
      - name: Create MinGW import library from vosk DLL
        run: |
          cd libs/vosk/vosk
          gendef libvosk.dll
          x86_64-w64-mingw32-dlltool -d libvosk.def -l libvosk.a -D libvosk.dll
          
      - name: Patch vosk module
        run: |
          cd chipper
          go mod download
          GOMODCACHE=$(go env GOMODCACHE)
          sudo cp ../libs/vosk/vosk/vosk_api.h "$GOMODCACHE/github.com/alphacep/vosk-api/go@v0.3.45/"
          
      - name: Build chipper
        env:
          GOOS: windows
          GOARCH: amd64
          GO_TAGS: nolibopusfile
          CGO_ENABLED: 1
          CC: x86_64-w64-mingw32-gcc
          CGO_LDFLAGS: "-L${GITHUB_WORKSPACE}/libs/opus/lib -L${GITHUB_WORKSPACE}/libs/ogg/lib -L${GITHUB_WORKSPACE}/libs/vosk/vosk"
          CGO_CFLAGS: "-I${GITHUB_WORKSPACE}/libs/opus/include -I${GITHUB_WORKSPACE}/libs/ogg/include -I${GITHUB_WORKSPACE}/libs/vosk/vosk"
          PKG_CONFIG_PATH: "${GITHUB_WORKSPACE}/libs/opus/lib/pkgconfig:${GITHUB_WORKSPACE}/libs/ogg/lib/pkgconfig"
        run: |
          cd chipper
          x86_64-w64-mingw32-windres cmd/windows/rc/app.rc -O coff -o cmd/windows/app.syso
          go build -tags ${GO_TAGS} -ldflags "-H=windowsgui" -o windows/chipper.exe ./cmd/windows
          go build -tags ${GO_TAGS} -ldflags "-H=windowsgui" -o windows/uninstall.exe ./cmd/wire-pod-installer/uninstall/main.go
          
      - name: Create distribution package
        run: |
          cd chipper
          mkdir -p tmp/wire-pod/chipper
          cp -r intent-data tmp/wire-pod/chipper/
          cp weather-map.json tmp/wire-pod/chipper/
          cp -r webroot tmp/wire-pod/chipper/
          cp -r epod tmp/wire-pod/chipper/
          cp stttest.pcm tmp/wire-pod/chipper/
          cp -r icons tmp/wire-pod/chipper/
          cp windows/uninstall.exe tmp/wire-pod/
          cp windows/chipper.exe tmp/wire-pod/chipper/
          cp ../libs/vosk/vosk/libvosk.dll tmp/wire-pod/chipper/
          cp ../libs/opus/lib/*.dll tmp/wire-pod/chipper/ 2>/dev/null || echo "No opus dll"
          cp ../libs/ogg/lib/*.dll tmp/wire-pod/chipper/ 2>/dev/null || echo "No ogg dll"
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wire-pod-windows-${{ inputs.version }}
          path: chipper/tmp/wire-pod/
