name: Build wire-pod Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'v1.1.2-chinese-tts'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      WORKSPACE: ${{ github.workspace }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mingw-w64 build-essential autoconf libtool automake \
            pkg-config wget unzip curl git make gcc g++ make zstd
            
      - name: Download prebuilt Windows libraries
        run: |
          set -e
          cd $GITHUB_WORKSPACE
          mkdir -p libs
          cd libs
          
          wget -q "https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-opus-1.3.1-2-any.pkg.tar.zst" -O opus.pkg.tar.zst
          tar -xf opus.pkg.tar.zst
          rm opus.pkg.tar.zst
          
          wget -q "https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-libogg-1.3.5-1-any.pkg.tar.zst" -O ogg.pkg.tar.zst
          tar -xf ogg.pkg.tar.zst
          rm ogg.pkg.tar.zst
          
          echo "=== Libraries downloaded ==="
          find . -name "*.dll" -o -name "*.a" | head -10
          
      - name: Download vosk
        run: |
          set -e
          cd $GITHUB_WORKSPACE/libs
          mkdir -p vosk
          cd vosk
          wget -q https://github.com/alphacep/vosk-api/releases/download/v0.3.45/vosk-win64-0.3.45.zip
          unzip -o vosk-win64-0.3.45.zip
          mv vosk-win64-0.3.45 vosk
          
          cd vosk
          gendef libvosk.dll
          x86_64-w64-mingw32-dlltool -d libvosk.def -l libvosk.a -D libvosk.dll
          ls -la
          
      - name: Setup Go modules
        run: |
          set -e
          cd $GITHUB_WORKSPACE/chipper
          go mod download
          GOMODCACHE=$(go env GOMODCACHE)
          sudo cp ../libs/vosk/vosk/vosk_api.h "$GOMODCACHE/github.com/alphacep/vosk-api/go@v0.3.45/"
          
      - name: Build chipper
        run: |
          set -e
          cd $GITHUB_WORKSPACE/chipper
          
          OPUS_DIR=$GITHUB_WORKSPACE/libs/mingw64
          VOSK_DIR=$GITHUB_WORKSPACE/libs/vosk/vosk
          
          export GOOS=windows
          export GOARCH=amd64
          export GO_TAGS=nolibopusfile
          export CGO_ENABLED=1
          export CC=x86_64-w64-mingw32-gcc
          export CGO_LDFLAGS="-L$OPUS_DIR/lib -L$VOSK_DIR -L/usr/x86_64-w64-mingw32/lib"
          export CGO_CFLAGS="-I$VOSK_DIR -I$OPUS_DIR/include"
          export PKG_CONFIG_PATH="$OPUS_DIR/lib/pkgconfig"
          
          echo "OPUS_DIR: $OPUS_DIR"
          ls -la $OPUS_DIR/lib/ | head -10
          
          x86_64-w64-mingw32-windres cmd/windows/rc/app.rc -O coff -o cmd/windows/app.syso
          go build -tags $GO_TAGS -ldflags "-H=windowsgui" -o windows/chipper.exe ./cmd/windows
          go build -tags $GO_TAGS -ldflags "-H=windowsgui" -o windows/uninstall.exe ./cmd/wire-pod-installer/uninstall/main.go
          
          echo "=== Build success ==="
          ls -la windows/*.exe
          
      - name: Package distribution
        run: |
          set -e
          cd $GITHUB_WORKSPACE/chipper
          mkdir -p tmp/wire-pod/chipper
          
          cp -r intent-data tmp/wire-pod/chipper/
          cp weather-map.json tmp/wire-pod/chipper/
          cp -r webroot tmp/wire-pod/chipper/
          cp -r epod tmp/wire-pod/chipper/
          cp stttest.pcm tmp/wire-pod/chipper/
          cp -r icons tmp/wire-pod/chipper/
          cp windows/uninstall.exe tmp/wire-pod/
          cp windows/chipper.exe tmp/wire-pod/chipper/
          cp $GITHUB_WORKSPACE/libs/vosk/vosk/libvosk.dll tmp/wire-pod/chipper/
          cp $GITHUB_WORKSPACE/libs/mingw64/lib/*.dll tmp/wire-pod/chipper/ 2>/dev/null || true
          
          echo "=== Package created ==="
          ls -la tmp/wire-pod/chipper/
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wire-pod-windows-${{ inputs.version }}
          path: chipper/tmp/wire-pod/
