name: Build wire-pod Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'v1.1.2-chinese-tts'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mingw-w64 build-essential autoconf libtool automake \
            pkg-config curl unzip git make gcc g++ zstd
            
      - name: Download prebuilt Windows libraries
        run: |
          mkdir -p libs
          cd libs
          
          curl -sL "https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-opus-1.3.1-2-any.pkg.tar.zst" -o opus.pkg.tar.zst
          tar -xf opus.pkg.tar.zst
          rm -f opus.pkg.tar.zst
          
          curl -sL "https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-libogg-1.3.5-1-any.pkg.tar.zst" -o ogg.pkg.tar.zst
          tar -xf ogg.pkg.tar.zst
          rm -f ogg.pkg.tar.zst
          
          echo "=== Find pkgconfig ==="
          find . -name "opus.pc" 2>/dev/null
          find . -name "*.pc" 2>/dev/null | head -5
          
      - name: Download vosk
        run: |
          mkdir -p libs/vosk
          cd libs/vosk
          curl -sL https://github.com/alphacep/vosk-api/releases/download/v0.3.45/vosk-win64-0.3.45.zip -o vosk.zip
          unzip -o vosk.zip
          mv vosk-win64-0.3.45 vosk
          
          cd vosk
          if command -v gendef &> /dev/null; then
            gendef libvosk.dll 2>/dev/null || true
            x86_64-w64-mingw32-dlltool -d libvosk.def -l libvosk.a -D libvosk.dll 2>/dev/null || true
          fi
          ls -la
          
      - name: Setup Go modules
        run: |
          cd chipper
          go mod download
          GOMODCACHE=$(go env GOMODCACHE)
          cp ../libs/vosk/vosk/vosk_api.h "$GOMODCACHE/github.com/alphacep/vosk-api/go@v0.3.45/" 2>/dev/null || \
          sudo cp ../libs/vosk/vosk/vosk_api.h "$GOMODCACHE/github.com/alphacep/vosk-api/go@v0.3.45/"
          
      - name: Build chipper
        run: |
          cd chipper
          
          # Find actual paths
          MINGW_ROOT=$GITHUB_WORKSPACE/libs/mingw64
          VOSK_DIR=$GITHUB_WORKSPACE/libs/vosk/vosk
          
          # Find pkgconfig path
          OPUS_PC=$(find $MINGW_ROOT -name "opus.pc" 2>/dev/null | head -1)
          OPUS_PC_DIR=$(dirname "$OPUS_PC" 2>/dev/null)
          
          echo "OPUS_PC: $OPUS_PC"
          echo "OPUS_PC_DIR: $OPUS_PC_DIR"
          
          export GOOS=windows
          export GOARCH=amd64
          export GO_TAGS=nolibopusfile
          export CGO_ENABLED=1
          export CC=x86_64-w64-mingw32-gcc
          export CGO_LDFLAGS="-L$MINGW_ROOT/lib -L$VOSK_DIR -L/usr/x86_64-w64-mingw32/lib"
          export CGO_CFLAGS="-I$VOSK_DIR -I$MINGW_ROOT/include"
          export PKG_CONFIG_PATH="$OPUS_PC_DIR:$MINGW_ROOT/lib/pkgconfig"
          
          echo "PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
          pkg-config --list-all 2>/dev/null | grep opus || echo "opus not in pkg-config"
          
          x86_64-w64-mingw32-windres cmd/windows/rc/app.rc -O coff -o cmd/windows/app.syso
          go build -tags $GO_TAGS -ldflags "-H=windowsgui" -o windows/chipper.exe ./cmd/windows
          go build -tags $GO_TAGS -ldflags "-H=windowsgui" -o windows/uninstall.exe ./cmd/wire-pod-installer/uninstall/main.go
          
          echo "=== Build success ==="
          ls -la windows/*.exe
          
      - name: Package distribution
        run: |
          cd chipper
          mkdir -p tmp/wire-pod/chipper
          
          cp -r intent-data tmp/wire-pod/chipper/
          cp weather-map.json tmp/wire-pod/chipper/
          cp -r webroot tmp/wire-pod/chipper/
          cp -r epod tmp/wire-pod/chipper/
          cp stttest.pcm tmp/wire-pod/chipper/
          cp -r icons tmp/wire-pod/chipper/
          cp windows/uninstall.exe tmp/wire-pod/
          cp windows/chipper.exe tmp/wire-pod/chipper/
          cp ../libs/vosk/vosk/libvosk.dll tmp/wire-pod/chipper/ 2>/dev/null || true
          cp ../libs/mingw64/bin/*.dll tmp/wire-pod/chipper/ 2>/dev/null || true
          
          echo "=== Package ==="
          ls -la tmp/wire-pod/chipper/
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wire-pod-windows-${{ inputs.version }}
          path: chipper/tmp/wire-pod/
