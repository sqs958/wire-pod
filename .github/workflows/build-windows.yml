name: Build wire-pod Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'v1.1.2-chinese-tts'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install all dependencies in one step
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mingw-w64 build-essential autoconf libtool automake \
            pkg-config wget unzip curl git make gcc g++ \
            mingw-w64-tools
          
      - name: Build Windows libraries (opus, ogg, vosk)
        run: |
          set -e
          export PODHOST=x86_64-w64-mingw32
          export WORKSPACE=$GITHUB_WORKSPACE
          export PREFIX=$WORKSPACE/local
          mkdir -p $PREFIX
          
          # Build ogg
          cd $WORKSPACE
          rm -rf ogg
          git clone --depth=1 https://github.com/xiph/ogg
          cd ogg
          ./autogen.sh
          ./configure --host=$PODHOST --prefix=$PREFIX
          make -j$(nproc)
          sudo make install
          
          # Build opus
          cd $WORKSPACE
          rm -rf opus
          git clone --depth=1 https://github.com/xiph/opus
          cd opus
          ./autogen.sh
          ./configure --host=$PODHOST --prefix=$PREFIX
          make -j$(nproc)
          sudo make install
          
          # Download and setup vosk
          cd $WORKSPACE
          mkdir -p libs/vosk
          cd libs/vosk
          wget -q https://github.com/alphacep/vosk-api/releases/download/v0.3.45/vosk-win64-0.3.45.zip
          unzip -o vosk-win64-0.3.45.zip
          mv vosk-win64-0.3.45 vosk
          
          # Create MinGW import library
          cd vosk
          gendef libvosk.dll
          x86_64-w64-mingw32-dlltool -d libvosk.def -l libvosk.a -D libvosk.dll
          
          echo "=== Build libraries done ==="
          ls -la $PREFIX/lib/
          ls -la vosk/
          
      - name: Setup Go modules and build
        run: |
          set -e
          export WORKSPACE=$GITHUB_WORKSPACE
          export PREFIX=$WORKSPACE/local
          
          cd $WORKSPACE/chipper
          
          # Download Go modules
          go mod download
          
          # Copy vosk header
          GOMODCACHE=$(go env GOMODCACHE)
          sudo cp $WORKSPACE/libs/vosk/vosk/vosk_api.h "$GOMODCACHE/github.com/alphacep/vosk-api/go@v0.3.45/"
          
          # Build chipper with all env vars
          export GOOS=windows
          export GOARCH=amd64
          export GO_TAGS=nolibopusfile
          export CGO_ENABLED=1
          export CC=x86_64-w64-mingw32-gcc
          export CGO_LDFLAGS="-L$PREFIX/lib -L$WORKSPACE/libs/vosk/vosk"
          export CGO_CFLAGS="-I$PREFIX/include -I$WORKSPACE/libs/vosk/vosk"
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          
          # Compile resources
          x86_64-w64-mingw32-windres cmd/windows/rc/app.rc -O coff -o cmd/windows/app.syso
          
          # Build chipper
          go build -tags $GO_TAGS -ldflags "-H=windowsgui" -o windows/chipper.exe ./cmd/windows
          
          # Build uninstaller
          go build -tags $GO_TAGS -ldflags "-H=windowsgui" -o windows/uninstall.exe ./cmd/wire-pod-installer/uninstall/main.go
          
          echo "=== Build done ==="
          ls -la windows/*.exe
          
      - name: Package distribution
        run: |
          set -e
          export WORKSPACE=$GITHUB_WORKSPACE
          export PREFIX=$WORKSPACE/local
          
          cd $WORKSPACE/chipper
          mkdir -p tmp/wire-pod/chipper
          
          # Copy all files
          cp -r intent-data tmp/wire-pod/chipper/
          cp weather-map.json tmp/wire-pod/chipper/
          cp -r webroot tmp/wire-pod/chipper/
          cp -r epod tmp/wire-pod/chipper/
          cp stttest.pcm tmp/wire-pod/chipper/
          cp -r icons tmp/wire-pod/chipper/
          cp windows/uninstall.exe tmp/wire-pod/
          cp windows/chipper.exe tmp/wire-pod/chipper/
          cp $WORKSPACE/libs/vosk/vosk/libvosk.dll tmp/wire-pod/chipper/
          cp $PREFIX/bin/*.dll tmp/wire-pod/chipper/ 2>/dev/null || true
          
          echo "=== Package created ==="
          ls -la tmp/wire-pod/chipper/
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wire-pod-windows-${{ inputs.version }}
          path: chipper/tmp/wire-pod/
